{% extends "base.html" %}

{% block content %}
  <h2>Удалить продукт: {{ object.name }}</h2>
  <p>Вы уверены, что хотите удалить этот продукт?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'catalog:home' %}" class="btn btn-secondary">Отмена</a>
  </form>
{% endblock %}
